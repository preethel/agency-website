name: Deploy Agency Website (dev.ark8.space)

on:
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - "data/**"
      - "public/**"
      - "lib/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.js"
      - "tailwind.config.ts"
      - "tsconfig.json"
      - "postcss.config.js"
      - ".github/workflows/deploy-dev.yml"
      - "deploy/**"
      - "scripts/**"
      - "ecosystem.config.cjs"
  workflow_dispatch:

concurrency:
  group: agency-website-dev-deploy
  cancel-in-progress: true

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Create release archive
        run: |
          rm -rf release-src
          mkdir -p release-src
          rsync -a ./ release-src/ \
            --exclude=.git \
            --exclude=.github \
            --exclude=node_modules \
            --exclude=.next \
            --exclude=release-src \
            --exclude=release.tar.gz
          tar -czf release.tar.gz -C release-src .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: agency-website-release
          path: release.tar.gz
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-verify

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: agency-website-release

      - name: Prepare optional env file
        env:
          ENV_DEV: ${{ secrets.ENV_DEV }}
        run: |
          : > env.production
          if [ -n "${ENV_DEV:-}" ]; then
            printf '%s' "$ENV_DEV" > env.production
          fi

      - name: Prepare deploy bundle
        run: |
          mkdir -p deploy-assets
          cp release.tar.gz deploy-assets/release.tar.gz
          cp scripts/deploy-dev-server.sh deploy-assets/deploy-dev-server.sh
          cp deploy/nginx/dev.ark8.space.conf deploy-assets/dev.ark8.space.conf
          cp ecosystem.config.cjs deploy-assets/ecosystem.config.cjs
          cp env.production deploy-assets/env.production

      - name: Upload deploy bundle to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          source: "deploy-assets/*"
          target: "/home/${{ secrets.GCP_VM_USERNAME }}/agency-website-deploy"
          overwrite: true

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          script: |
            set -euo pipefail
            DEPLOY_DIR="$HOME/agency-website-deploy/deploy-assets"
            SOURCE_DIR="$DEPLOY_DIR/source"

            mkdir -p "$SOURCE_DIR"
            rm -rf "$SOURCE_DIR"/*
            tar -xzf "$DEPLOY_DIR/release.tar.gz" -C "$SOURCE_DIR"

            chmod +x "$DEPLOY_DIR/deploy-dev-server.sh"
            APP_DOMAIN="dev.ark8.space" APP_PORT="3010" "$DEPLOY_DIR/deploy-dev-server.sh" "$DEPLOY_DIR"
